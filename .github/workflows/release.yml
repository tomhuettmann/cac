name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Release
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Run tests
        run: cargo test

      - name: Build
        run: |
          cargo build --release
          mkdir -p release
          cp target/release/cac release/cac
          chmod +x release/cac

      - name: Create tarball
        run: |
          cd release
          tar -czf cac-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz cac
          shasum -a 256 cac-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz > cac-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release/cac-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz
            release/cac-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz.sha256
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
